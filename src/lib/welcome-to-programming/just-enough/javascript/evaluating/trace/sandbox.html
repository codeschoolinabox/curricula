<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Trace Lens Sandbox</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			.sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				border: 0;
			}
			body {
				background: #1e1e1e;
				color: #d4d4d4;
				font-family: 'Consolas', 'Monaco', monospace;
				height: 100vh;
				display: flex;
				flex-direction: column;
			}
			h1 {
				font-size: 14px;
				color: #888;
				padding: 12px 16px;
			}

			/* --- Two-column layout: sidebar + main --- */
			.layout {
				display: flex;
				flex: 1;
				min-height: 0;
				gap: 12px;
				padding: 0 16px 16px;
			}

			/* --- Sidebar (config) --- */
			.sidebar {
				width: 180px;
				flex-shrink: 0;
				background: #252526;
				border: 1px solid #333;
				padding: 12px;
				overflow-y: auto;
				font-size: 12px;
			}
			.sidebar h2 {
				font-size: 11px;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				margin: 12px 0 6px;
			}
			.sidebar h2:first-child {
				margin-top: 0;
			}
			.sidebar label {
				display: block;
				padding: 2px 0;
				cursor: pointer;
			}
			.sidebar label:hover {
				color: #fff;
			}
			.sidebar input[type='checkbox'] {
				margin-right: 6px;
				vertical-align: middle;
			}
			.sidebar .field-input {
				width: 100%;
				background: #1e1e1e;
				color: #d4d4d4;
				border: 1px solid #444;
				font-family: inherit;
				font-size: 11px;
				padding: 3px 6px;
				margin: 2px 0 6px;
			}
			.sidebar .field-input:focus {
				outline: 1px solid #264f78;
				border-color: #264f78;
			}
			.sidebar .field-label {
				font-size: 11px;
				color: #999;
				margin-top: 4px;
			}

			/* --- Main column --- */
			.main {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 8px;
				min-width: 0;
			}

			/* --- Controls --- */
			.controls {
				display: flex;
				gap: 8px;
				align-items: center;
			}
			select,
			button {
				background: #2d2d2d;
				color: #d4d4d4;
				border: 1px solid #444;
				padding: 6px 10px;
				font-family: inherit;
				font-size: 13px;
				cursor: pointer;
			}
			select:hover,
			button:hover {
				border-color: #666;
			}
			button {
				background: #264f78;
				border-color: #264f78;
			}
			button:hover {
				background: #365f88;
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			/* --- Code editor --- */
			textarea {
				background: #1e1e1e;
				color: #d4d4d4;
				border: 1px solid #444;
				font-family: inherit;
				font-size: 13px;
				padding: 12px;
				resize: vertical;
				tab-size: 2;
				min-height: 100px;
				height: 150px;
			}
			textarea:focus {
				outline: 1px solid #264f78;
				border-color: #264f78;
			}

			/* --- Status --- */
			#status {
				font-size: 12px;
				color: #888;
			}
			#status.error {
				color: #f44;
			}
			#status.ok {
				color: #4a4;
			}

			/* --- Output --- */
			pre {
				background: #252526;
				border: 1px solid #333;
				padding: 12px;
				overflow: auto;
				flex: 1;
				font-size: 12px;
				white-space: pre;
				min-height: 0;
			}
			.output-label {
				font-size: 11px;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}
		</style>
	</head>
	<body>
		<h1>Trace Lens Sandbox</h1>

		<div class="layout">
			<!-- Sidebar -->
			<div class="sidebar">
				<h2>Execution</h2>
				<label class="field-label" for="cfg-max-seconds">max seconds</label>
				<input
					type="number"
					class="field-input"
					id="cfg-max-seconds"
					value="20"
					min="1"
					max="30"
				/>

				<h2>Categories</h2>
				<label
					><input type="checkbox" id="cfg-variables" checked /> variables</label
				>
				<label
					><input type="checkbox" id="cfg-operators" checked /> operators</label
				>
				<label
					><input type="checkbox" id="cfg-controlFlow" checked />
					controlFlow</label
				>
				<label
					><input type="checkbox" id="cfg-functions" checked /> functions</label
				>
				<label
					><input type="checkbox" id="cfg-functionDeclarations" checked />
					functionDeclarations</label
				>
				<label><input type="checkbox" id="cfg-this" checked /> this</label>
				<label
					><input type="checkbox" id="cfg-errorHandling" checked />
					errorHandling</label
				>
				<label
					><input type="checkbox" id="cfg-enterLeave" checked />
					enterLeave</label
				>

				<h2>List Filters</h2>
				<div class="field-label">operatorsList (comma-sep)</div>
				<input
					type="text"
					class="field-input"
					id="cfg-operatorsList"
					placeholder="+, -, ==="
				/>
				<div class="field-label">controlFlowList</div>
				<input
					type="text"
					class="field-input"
					id="cfg-controlFlowList"
					placeholder="if, while, for"
				/>

				<h2>Name Filter</h2>
				<div class="field-label">names (empty = all)</div>
				<input
					type="text"
					class="field-input"
					id="cfg-names"
					placeholder="x, add, total"
				/>

				<h2>Range</h2>
				<label class="field-label" for="cfg-range-start">start line</label>
				<input
					type="number"
					class="field-input"
					id="cfg-range-start"
					value="1"
					min="1"
				/>
				<label class="field-label" for="cfg-range-end">end line</label>
				<input
					type="number"
					class="field-input"
					id="cfg-range-end"
					value="100000"
					min="1"
				/>

				<h2>Data Fields</h2>
				<label><input type="checkbox" id="cfg-data-loc" checked /> loc</label>
				<label
					><input type="checkbox" id="cfg-data-values" checked /> values</label
				>
				<label
					><input type="checkbox" id="cfg-data-nodeType" checked />
					nodeType</label
				>
				<label
					><input type="checkbox" id="cfg-data-depth" checked /> depth</label
				>
			</div>

			<!-- Main content -->
			<div class="main">
				<div class="controls">
					<label for="snippet-select" class="sr-only">Snippet</label>
					<select id="snippet-select" title="Choose a test snippet">
						<option value="">-- pick a snippet --</option>
					</select>
					<button type="button" id="trace-btn">Trace</button>
					<button type="button" id="copy-btn">Copy</button>
				</div>

				<label for="code" class="sr-only">Code to trace</label>
				<textarea id="code" spellcheck="false">
let name = prompt('What is your name?', 'a toad');
console.log('Hello, ' + name + '!');

let again = confirm('Run again?');
console.log('again:', again);

alert('Done!');
</textarea
				>

				<div id="status"></div>
				<div class="output-label">Trace steps (AranStep[])</div>
				<pre id="output"></pre>
			</div>
		</div>

		<script type="module">
			import record from './record/record.ts';

			const SNIPPET_DIR = './record/tests/test-snippets';
			const SNIPPETS = [
				'break-continue.js',
				'do-while.js',
				'errors.js',
				'for-classic.js',
				'for-in.js',
				'for-of.js',
				'functions.js',
				'hoisting.js',
				'if-else.js',
				'logical-operators.js',
				'operators.js',
				'switch.js',
				'ternary.js',
				'variables.js',
				'while.js',
			];

			const selectEl = document.getElementById('snippet-select');
			const codeEl = document.getElementById('code');
			const outputEl = document.getElementById('output');
			const traceBtn = document.getElementById('trace-btn');
			const copyBtn = document.getElementById('copy-btn');
			const statusEl = document.getElementById('status');

			for (const name of SNIPPETS) {
				const opt = document.createElement('option');
				opt.value = name;
				opt.textContent = name.replace('.js', '');
				selectEl.appendChild(opt);
			}

			function readCheckbox(id) {
				return document.getElementById(id).checked;
			}

			function readList(id) {
				const value = document.getElementById(id).value.trim();
				if (!value) return undefined;
				return value
					.split(',')
					.map(function (s) {
						return s.trim();
					})
					.filter(Boolean);
			}

			function readNumber(id) {
				const value = parseInt(document.getElementById(id).value, 10);
				return isNaN(value) ? undefined : value;
			}

			function buildOptions() {
				const options = {};
				options.variables = readCheckbox('cfg-variables');
				options.operators = readCheckbox('cfg-operators');
				options.controlFlow = readCheckbox('cfg-controlFlow');
				options.functions = readCheckbox('cfg-functions');
				options.functionDeclarations = readCheckbox('cfg-functionDeclarations');
				options.this = readCheckbox('cfg-this');
				options.errorHandling = readCheckbox('cfg-errorHandling');
				options.enterLeave = readCheckbox('cfg-enterLeave');

				const filter = {};
				const ol = readList('cfg-operatorsList');
				if (ol) filter.operatorsList = ol;
				const cl = readList('cfg-controlFlowList');
				if (cl) filter.controlFlowList = cl;
				const names = readList('cfg-names');
				if (names) filter.names = names;
				if (Object.keys(filter).length > 0) options.filter = filter;

				const start = readNumber('cfg-range-start');
				const end = readNumber('cfg-range-end');
				if (start !== undefined || end !== undefined) {
					options.range = {};
					if (start !== undefined) options.range.start = start;
					if (end !== undefined) options.range.end = end;
				}

				options.data = {
					loc: readCheckbox('cfg-data-loc'),
					values: readCheckbox('cfg-data-values'),
					nodeType: readCheckbox('cfg-data-nodeType'),
					depth: readCheckbox('cfg-data-depth'),
				};

				return options;
			}

			selectEl.addEventListener('change', async function () {
				if (!selectEl.value) return;
				try {
					const res = await fetch(SNIPPET_DIR + '/' + selectEl.value);
					if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
					codeEl.value = await res.text();
				} catch (err) {
					codeEl.value =
						'// Failed to load ' + selectEl.value + ': ' + err.message;
				}
			});

			traceBtn.addEventListener('click', async function () {
				const code = codeEl.value.trim();
				if (!code) {
					outputEl.textContent = '// nothing to trace';
					return;
				}

				traceBtn.disabled = true;
				statusEl.textContent = 'tracing...';
				statusEl.className = '';
				outputEl.textContent = '';

				const maxSeconds =
					Number(document.getElementById('cfg-max-seconds').value) || 5;
				const options = buildOptions();

				try {
					const steps = await record(code, {
						meta: {
							max: {
								steps: null,
								iterations: null,
								callstack: null,
								time: maxSeconds * 1000,
							},
							range: null,
							timestamps: false,
							debug: { ast: false },
						},
						options,
					});

					outputEl.textContent = JSON.stringify(steps, null, 2);
					statusEl.textContent = 'done — ' + steps.length + ' step(s)';
					statusEl.className = 'ok';
					console.log('--- filtered steps ---');
					console.log(steps);
				} catch (err) {
					outputEl.textContent = '// Error: ' + err.message + '\n' + err.stack;
					statusEl.textContent = 'error: ' + err.message;
					statusEl.className = 'error';
				} finally {
					traceBtn.disabled = false;
				}
			});

			copyBtn.addEventListener('click', function () {
				navigator.clipboard.writeText(outputEl.textContent).then(
					function () {
						copyBtn.textContent = 'Copied!';
					},
					function () {
						copyBtn.textContent = 'Failed';
					},
				);
				setTimeout(function () {
					copyBtn.textContent = 'Copy';
				}, 1500);
			});

			if (typeof SharedArrayBuffer === 'undefined') {
				statusEl.textContent =
					'SharedArrayBuffer not available — serve with COOP/COEP headers (see vite.sandbox.config.ts). Tracing still works but worker timeout will not.';
				statusEl.className = 'error';
			}
		</script>
	</body>
</html>
