<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Debug Lens Sandbox</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: monospace;
				padding: 2rem;
				max-width: 700px;
				margin: 0 auto;
			}
			h1 {
				font-size: 1.2rem;
				margin-bottom: 1rem;
			}
			textarea {
				width: 100%;
				height: 200px;
				font-family: monospace;
				font-size: 14px;
				padding: 0.5rem;
				tab-size: 2;
				border: 2px solid #333;
				resize: vertical;
			}
			.controls {
				margin-top: 0.5rem;
				display: flex;
				gap: 0.5rem;
				align-items: center;
			}
			button {
				padding: 0.5rem 1.5rem;
				font-family: monospace;
				font-size: 14px;
				cursor: pointer;
				border: 2px solid #333;
				background: #eee;
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			label {
				font-size: 13px;
			}
			input[type='number'] {
				width: 5em;
				font-family: monospace;
				font-size: 14px;
				padding: 0.3rem;
				border: 2px solid #333;
			}
			#status {
				margin-top: 0.5rem;
				font-size: 13px;
				color: #666;
			}
		</style>
	</head>
	<body>
		<h1>Debug Lens Sandbox</h1>
		<p style="margin-bottom: 0.5rem; font-size: 13px; color: #666">
			Open DevTools before clicking [debug] — the debugger will pause before and
			after your code.
		</p>
		<textarea id="code">
while (true) {
  let input = prompt('for a frog');

  if (input === null) break;

  for (const char of input) {
    console.log(char);
  }
}
</textarea
		>
		<div class="controls">
			<button id="run">[debug]</button>
			<label
				>max iterations:
				<input id="maxIterations" type="number" value="10" min="1" max="10000"
			/></label>
		</div>
		<div id="status"></div>

		<script type="module">
			import debug from './index.ts';

			const codeEl = document.getElementById('code');
			const runBtn = document.getElementById('run');
			const statusEl = document.getElementById('status');
			const maxIterationsEl = document.getElementById('maxIterations');

			runBtn.addEventListener('click', async () => {
				runBtn.disabled = true;
				statusEl.textContent = 'running… (step through debugger in DevTools)';

				try {
					const maxIterations = Number(maxIterationsEl.value) || undefined;
					await debug(codeEl.value, maxIterations);
					statusEl.textContent = 'done — wrapper removed from DOM';
				} catch (err) {
					statusEl.textContent = `error: ${err.message}`;
				} finally {
					runBtn.disabled = false;
				}
			});
		</script>
	</body>
</html>
